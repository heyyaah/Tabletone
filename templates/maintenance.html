{% extends "base.html" %}
{% block title %}Tabletone — Технические работы{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;">
    <div style="text-align:center;max-width:480px;background:rgba(255,255,255,0.95);border-radius:24px;padding:50px 40px;box-shadow:0 20px 60px rgba(0,0,0,0.2);">
        <div style="font-size:72px;margin-bottom:20px;">🔧</div>
        <h1 style="color:#2d3748;font-size:26px;font-weight:700;margin-bottom:16px;">Технические работы</h1>
        <p style="color:#718096;font-size:16px;line-height:1.7;margin-bottom:24px;">
            Извините! Произошли неполадки со стороны мессенджера.<br>
            Скоро всё починим!
        </p>
        <div style="background:#f0f4ff;border-radius:12px;padding:16px;color:#667eea;font-size:14px;font-weight:500;">
            <i class="fas fa-clock"></i> Мы уже работаем над устранением проблемы
        </div>
        <p style="margin-top:24px;color:#a0aec0;font-size:13px;">
            Tabletone &mdash; вернёмся совсем скоро
        </p>
    </div>
</div>
{% endblock %}
