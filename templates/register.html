{% extends "base.html" %}

{% block title %}Регистрация - Tabletone{% endblock %}

{% block footer %}{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1><i class="fas fa-user-plus"></i> Регистрация</h1>
            <p class="auth-subtitle">Создайте новый аккаунт</p>
        </div>
        
        {% if error %}
        <div class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">
                    <i class="fas fa-at"></i> Имя пользователя (username)
                </label>
                <input type="text" id="username" name="username" 
                       placeholder="username (минимум 4 символа)" required pattern="[a-zA-Z0-9_]+" minlength="4" maxlength="50"
                       title="Только латинские буквы, цифры и подчеркивание. Минимум 4 символа.">
            </div>
            
            <div class="form-group">
                <label for="display_name">
                    <i class="fas fa-signature"></i> Отображаемое имя (необязательно)
                </label>
                <input type="text" id="display_name" name="display_name" 
                       placeholder="Ваше имя для отображения">
            </div>
            
            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i> Пароль
                </label>
                <input type="password" id="password" name="password" 
                       placeholder="Придумайте пароль" required minlength="4">
            </div>
            
            <div class="form-group">
                <label for="timezone">
                    <i class="fas fa-clock"></i> Ваш часовой пояс
                </label>
                <select id="timezone" name="timezone" class="form-control" style="width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:12px;font-size:14px;">
                    <option value="Europe/Moscow">Москва (UTC+3)</option>
                    <option value="Europe/Kaliningrad">Калининград (UTC+2)</option>
                    <option value="Europe/Samara">Самара (UTC+4)</option>
                    <option value="Asia/Yekaterinburg">Екатеринбург (UTC+5)</option>
                    <option value="Asia/Omsk">Омск (UTC+6)</option>
                    <option value="Asia/Krasnoyarsk">Красноярск (UTC+7)</option>
                    <option value="Asia/Irkutsk">Иркутск (UTC+8)</option>
                    <option value="Asia/Yakutsk">Якутск (UTC+9)</option>
                    <option value="Asia/Vladivostok">Владивосток (UTC+10)</option>
                    <option value="Asia/Magadan">Магадан (UTC+11)</option>
                    <option value="Asia/Kamchatka">Камчатка (UTC+12)</option>
                    <option value="Europe/Kiev">Киев (UTC+2)</option>
                    <option value="Europe/Minsk">Минск (UTC+3)</option>
                    <option value="Asia/Almaty">Алматы (UTC+6)</option>
                    <option value="Asia/Tashkent">Ташкент (UTC+5)</option>
                    <option value="Europe/London">Лондон (UTC+0)</option>
                    <option value="Europe/Berlin">Берлин (UTC+1)</option>
                    <option value="America/New_York">Нью-Йорк (UTC-5)</option>
                    <option value="America/Los_Angeles">Лос-Анджелес (UTC-8)</option>
                    <option value="Asia/Tokyo">Токио (UTC+9)</option>
                    <option value="Asia/Shanghai">Шанхай (UTC+8)</option>
                    <option value="Asia/Dubai">Дубай (UTC+4)</option>
                </select>
            </div>

            <div style="margin-bottom:16px; display:flex; flex-direction:column; gap:10px;">
                <label style="display:flex; align-items:flex-start; gap:10px; cursor:pointer; font-size:13px; color:#4a5568; line-height:1.5;">
                    <input type="checkbox" id="agree_privacy" name="agree_privacy" required
                           style="margin-top:2px; width:16px; height:16px; flex-shrink:0; cursor:pointer;"
                           onchange="checkAgreements()">
                    <span>Я прочитал(а) и соглашаюсь с
                        <a href="/privacy" target="_blank" style="color:#667eea;">Политикой конфиденциальности</a>
                        и даю согласие на обработку персональных данных
                    </span>
                </label>
                <label style="display:flex; align-items:flex-start; gap:10px; cursor:pointer; font-size:13px; color:#4a5568; line-height:1.5;">
                    <input type="checkbox" id="agree_terms" name="agree_terms" required
                           style="margin-top:2px; width:16px; height:16px; flex-shrink:0; cursor:pointer;"
                           onchange="checkAgreements()">
                    <span>Я принимаю
                        <a href="/terms" target="_blank" style="color:#667eea;">Условия использования</a>
                        сервиса Tabletone
                    </span>
                </label>
                <label style="display:flex; align-items:flex-start; gap:10px; cursor:pointer; font-size:13px; color:#4a5568; line-height:1.5;">
                    <input type="checkbox" id="agree_age" name="agree_age" required
                           style="margin-top:2px; width:16px; height:16px; flex-shrink:0; cursor:pointer;"
                           onchange="checkAgreements()">
                    <span>Мне исполнилось 13 лет</span>
                </label>
            </div>

            <!-- Капча -->
            <div class="form-group" style="background:var(--bg-secondary,#f7fafc);border:2px solid #e2e8f0;border-radius:12px;padding:14px 16px;">
                <label style="font-size:13px;font-weight:600;color:#4a5568;display:block;margin-bottom:8px;">
                    <i class="fas fa-robot" style="color:#667eea;margin-right:6px;"></i>Подтвердите, что вы не бот
                </label>
                <div style="display:flex;align-items:center;gap:12px;">
                    <span style="font-size:18px;font-weight:700;color:var(--text-primary,#2d3748);letter-spacing:2px;">{{ captcha_q }} = ?</span>
                    <input type="number" id="captcha_answer" name="captcha_answer" placeholder="Ответ"
                           required min="0" max="99"
                           style="width:90px;padding:8px 12px;border:2px solid #e2e8f0;border-radius:10px;font-size:16px;text-align:center;">
                </div>
            </div>

            <button type="submit" id="register-btn" class="btn btn-primary btn-block" disabled
                    style="opacity:0.5; cursor:not-allowed; transition:opacity 0.2s;">
                <i class="fas fa-user-plus"></i> Зарегистрироваться
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Уже есть аккаунт? <a href="/login">Войти</a></p>
        </div>
    </div>
</div>
<script>
    // Автоматически выбираем часовой пояс браузера
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const sel = document.getElementById('timezone');
    for (let opt of sel.options) {
        if (opt.value === tz) { opt.selected = true; break; }
    }

    function checkAgreements() {
        const ok = document.getElementById('agree_privacy').checked
                && document.getElementById('agree_terms').checked
                && document.getElementById('agree_age').checked;
        const btn = document.getElementById('register-btn');
        btn.disabled = !ok;
        btn.style.opacity = ok ? '1' : '0.5';
        btn.style.cursor = ok ? 'pointer' : 'not-allowed';
    }
</script>
{% endblock %}
