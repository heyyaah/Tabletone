<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tabletone{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ range(10000,99999)|random }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="icon" href="{{ url_for('static', filename='images/logo.png') }}" type="image/png">
</head>
<body {% block body_attrs %}{% endblock %}>
    <script>
        const _t = localStorage.getItem('theme');
        if (_t) document.body.setAttribute('data-theme', _t);
    </script>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
    <script>document.addEventListener('contextmenu', e => e.preventDefault());</script>
    {% block footer %}
    <footer class="site-footer">
        <span>&copy; 2026 Tabletone. Все права защищены.</span>
        <a href="/privacy">Политика конфиденциальности</a>
    </footer>
    {% endblock %}
    <!-- FCM токен: регистрируем на сервере когда Android-приложение передаёт токен -->
    <script>
    window.onFcmToken = function(token) {
        fetch('/fcm/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({token: token})
        }).catch(function(){});
    };
    // Если токен уже был передан до загрузки страницы
    if (window._fcmToken) window.onFcmToken(window._fcmToken);

    // Десктопные уведомления через Electron (правый нижний угол)
    window.showDesktopNotification = function(title, body) {
        if (window.__tabletoneDesktop) {
            // Electron-приложение
            window.__tabletoneDesktop.notify(title, body);
        } else if (Notification && Notification.permission === 'granted') {
            // Браузер
            new Notification(title, { body: body, icon: '/static/images/logo.png' });
        } else if (Notification && Notification.permission !== 'denied') {
            Notification.requestPermission().then(p => {
                if (p === 'granted') new Notification(title, { body: body, icon: '/static/images/logo.png' });
            });
        }
    };
    </script>
</body>
</html>
